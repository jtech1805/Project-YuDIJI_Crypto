name: Deploy Backend to AWS Production

# This pipeline only runs when code is pushed to the 'main' branch
# AND only if changes were made inside the yujidi-server folder.
on:
  push:
    branches: [ "main" ]
    paths:
      - "yujidi-server/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into AWS and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 0. Inject the exact Node bin folder into the system PATH
            export PATH="/home/ubuntu/.nvm/versions/node/v20.19.1/bin:$PATH"

            # 1. Enter the project folder
            cd ~/Project-YuDIJI_Crypto/yujidi-server

            # 2. Pull the latest code from GitHub
            git pull origin main

            # 3. Install packages
            npm install

            # 4. Restart the engine
            pm2 restart yujidi-engine
